<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BungaBeaute Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-box { max-width: 350px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #5c1a26; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #7a2534; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #5c1a26; font-family: 'Georgia', serif;">Bunga Beauté</h2>
        <p>Login Admin</p>
        <form id="formLogin">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Masuk</button>
        </form>
    </div>

<script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const result = await response.json();
            
            if (result.success) {
                localStorage.setItem('adminBunga_loggedIn', 'true'); // Kunci akses
                window.location.href = '/index.html';
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
